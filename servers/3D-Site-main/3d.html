<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>

        body,html {
            width: 100vw;
            height: 100vh;
            margin: 0;
        }

        .cubo {
            height: 100vh;
            width: 100vw;
        }
        
    </style>
</head>
<body>
    <model-viewer src="cubob.glb"
    camera-controls 
    shadow-intensity="1"
    alt="Um modelo 3D" class="cubo"
    camera-orbit="0deg 75deg 15m"
    min-camera-orbit="auto auto 0m"
    max-camera-orbit="auto auto 15m">
    </model-viewer> <!-- o comando camera-constrols para maninpular a câmera já que o cubo fica parado-->
    <!--https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js" modo viewer para pegar imagens-->
    <!--camera-orbit="0deg 75deg 15m" este comando faz com que tenha os dois primeiros se refere a graus vertical e horizontal para 
    girar o objeto e 15 m relativo ao zoom a posição dele o quanto está perto da tela, se colocar negativo ele ficará afastado da tela-->
</body>
</html>
